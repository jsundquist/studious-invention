# Branchline local dev stack — Camunda 8 workflow engine (Zeebe, Operate, Tasklist, Elasticsearch)
# Apps (API, UI, worker) run independently via their own native runtimes during development.
services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - cluster.name=elasticsearch
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cat/health | grep -q green"]
      interval: 30s
      timeout: 10s
      retries: 5

  zeebe:
    image: camunda/zeebe:8.6.0
    environment:
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_CLASSNAME=io.camunda.zeebe.exporter.ElasticsearchExporter
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_URL=http://elasticsearch:9200
      - ZEEBE_BROKER_EXPORTERS_ELASTICSEARCH_ARGS_BULK_SIZE=1
      - ZEEBE_BROKER_GATEWAY_ENABLE=true
      - ZEEBE_BROKER_GATEWAY_SECURITY_ENABLED=false
      - ZEEBE_BROKER_NETWORK_HOST=0.0.0.0
    ports:
      - "26500:26500"
      - "8080:8080"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9600' 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 7
      start_period: 30s

  operate:
    image: camunda/operate:8.6.0
    environment:
      - CAMUNDA_OPERATE_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_OPERATE_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_OPERATE_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
      - SPRING_PROFILES_ACTIVE=dev,auth
      - CAMUNDA_OPERATE_IMPORTER_READERBACKOFF=1000
      - CAMUNDA_OPERATE_IMPORTER_SCHEDULERBACKOFF=100
    ports:
      - "8081:8080"
    depends_on:
      zeebe:
        condition: service_healthy

  tasklist:
    image: camunda/tasklist:8.6.0
    environment:
      - CAMUNDA_TASKLIST_ZEEBE_GATEWAYADDRESS=zeebe:26500
      - CAMUNDA_TASKLIST_ELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_TASKLIST_ZEEBEELASTICSEARCH_URL=http://elasticsearch:9200
      - CAMUNDA_TASKLIST_IMPORTER_READERBACKOFF=1000
      - CAMUNDA_TASKLIST_IMPORTER_SCHEDULERBACKOFF=100
    ports:
      - "8082:8080"
    depends_on:
      zeebe:
        condition: service_healthy

  workflow-deployer:
    image: alpine:3.19
    volumes:
      - ./workflows:/workflows
    depends_on:
      zeebe:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl
        for f in /workflows/*.bpmn; do
          [ -f "$$f" ] || { echo 'No BPMN files found, skipping deploy'; break; }
          echo "Deploying $$f"
          curl -sf -X POST http://zeebe:8080/v2/deployments \
            -H "Content-Type: multipart/form-data" \
            -F "resources=@$$f;type=application/octet-stream" \
            && echo "Deployed $$f" || echo "Failed to deploy $$f"
        done
